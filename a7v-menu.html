<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="A7V Menu">
<meta name="theme-color" content="#080808">
<title>Sony A7V Menu</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23080808'/><rect x='8' y='8' width='84' height='84' rx='14' fill='%23111'/><text x='50' y='42' font-family='Helvetica' font-weight='900' font-size='22' fill='%23cc3800' text-anchor='middle'>SONY</text><text x='50' y='64' font-family='Helvetica' font-weight='700' font-size='16' fill='%23ffffff' text-anchor='middle'>A7V</text><text x='50' y='80' font-family='Helvetica' font-size='10' fill='%23888' text-anchor='middle'>MENU</text></svg>">
<style>
:root {
  --sw: 38px;        /* sidebar width */
  --bg: #080808;
  --sur: #0f0f0f;
  --bdr: #1c1c1c;
  --hi: #cc3800;     /* orange highlight */
  --val: #e08010;    /* orange value text */
  --txt: #ffffff;
  --dim: #888888;
  --dim2: #444444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:-apple-system,'Helvetica Neue',Helvetica,sans-serif}

/* ── ROOT + SEARCH ── */
#root{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── APP SHELL ── */
#app{display:flex;flex:1;overflow:hidden;position:relative;min-height:0}

/* ── SEARCH BAR ── */
#sq{display:flex;align-items:center;background:#050505;border-bottom:1px solid #181818;
  padding:5px 8px;gap:6px;flex-shrink:0;z-index:300}
#si{flex:1;background:#181818;border:1.5px solid #252525;color:#fff;
  border-radius:7px;padding:6px 10px 6px 10px;font-size:13px;outline:none;
  -webkit-appearance:none;min-width:0;caret-color:var(--hi)}
#si::placeholder{color:#444}
#si:focus{border-color:var(--hi)}
#sq-ic{color:#555;font-size:14px;flex-shrink:0}
#sq-cnt{font-size:10px;color:#666;white-space:nowrap;flex-shrink:0;
  min-width:26px;text-align:right}
#sq-x{background:none;border:none;color:#555;font-size:16px;cursor:pointer;
  padding:2px 4px;flex-shrink:0;line-height:1;display:none}
#sq-x:active{color:#fff}
#lb{background:var(--hi);color:#fff;border:none;border-radius:4px;
  padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}

/* ── SEARCH RESULTS ── */
#sr{display:none;flex-direction:column;flex:1;overflow-y:auto;
  scrollbar-width:none;background:var(--bg);min-height:0}
#sr::-webkit-scrollbar{display:none}
#sr.open{display:flex}
.rr{display:flex;align-items:center;padding:10px 10px;
  border-bottom:1px solid #111;gap:9px;cursor:pointer;min-height:46px}
.rr:active{background:#151515}
.rb{width:26px;height:22px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:800;color:#fff;
  flex-shrink:0;line-height:1.15;text-align:center}
.ri{flex:1;min-width:0}
.rc{font-size:9.5px;color:var(--dim);margin-bottom:2px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.rn{font-size:12.5px;color:#fff;line-height:1.3}
.rn mark{background:none;color:var(--hi);font-weight:700}
.re{font-size:10.5px;color:var(--dim);line-height:1.3;margin-top:1px}
.re mark{background:none;color:#cc6633;font-weight:600}
.rv{font-size:10px;color:var(--val);flex-shrink:0;max-width:70px;
  text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r0{padding:20px 14px;font-size:12px;color:var(--dim2)}

/* ── VERTICAL SIDEBAR ── */
#sb{width:var(--sw);background:#050505;border-right:1px solid #111;
  display:flex;flex-direction:column;align-items:center;
  padding:5px 0;gap:3px;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
#sb::-webkit-scrollbar{display:none}
.tb{width:30px;height:27px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;color:#fff;
  cursor:pointer;flex-shrink:0;position:relative;border:2px solid transparent}
.tb.active{border-color:#fff}
.t0{background:transparent;font-size:16px;color:#888;border-color:#333!important}
.t0.active{border-color:#fff!important}
.t1{background:#3a3a5a}
.t2{background:#bb2f00}
.t3{background:#b85800}
.t4{background:#6622aa;font-size:8px;line-height:1.1;text-align:center}
.t5{background:#1144bb}
.t6{background:#116633}
.t7{background:#775500}

/* ── MAIN PANEL ── */
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── HEADER ── */
#hd{display:flex;align-items:center;padding:4px 7px;background:var(--sur);
  border-bottom:1px solid var(--bdr);flex-shrink:0;min-height:30px;gap:4px}
#bc{font-size:11px;color:#bbb;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
#bc b{color:#fff}
#pg{font-size:11px;color:var(--dim);white-space:nowrap;flex-shrink:0}

/* ── CONTENT ── */
#ct{display:flex;flex:1;overflow:hidden}

/* cat list */
#cl{width:43%;border-right:1px solid var(--bdr);overflow-y:auto;scrollbar-width:none;flex-shrink:0}
#cl::-webkit-scrollbar{display:none}
.ci{display:flex;align-items:center;padding:6px 5px 6px 7px;
  border-bottom:1px solid #111;cursor:pointer;min-height:36px}
.ci.on{background:var(--hi)}
.cn{font-size:11px;color:var(--dim);min-width:12px;flex-shrink:0;margin-right:4px}
.ci.on .cn{color:#ffc090}
.cm{font-size:11.5px;line-height:1.3;color:#fff}
.ca{text-align:center;padding:3px;color:var(--dim2);font-size:10px}

/* item list */
#il{flex:1;overflow-y:auto;scrollbar-width:none;min-width:0}
#il::-webkit-scrollbar{display:none}
.ir{display:flex;align-items:center;padding:5px 7px;
  border-bottom:1px solid #111;min-height:32px;gap:3px;cursor:pointer}
.ir:active{background:#1a1a1a}
.ir.nd{cursor:default}
.in{font-size:11.5px;color:#ddd;flex:1;min-width:0;line-height:1.3}
.iv{font-size:10.5px;color:var(--val);white-space:nowrap;flex-shrink:0;
  max-width:70px;overflow:hidden;text-overflow:ellipsis;text-align:right}
.ia{color:var(--val);font-size:9px;flex-shrink:0}

/* ── BOTTOM BAR ── */
#bt{display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;background:var(--sur);border-top:1px solid var(--bdr);flex-shrink:0}
.nh{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
.nk{background:#222;border-radius:3px;padding:2px 6px;font-size:9px;color:#bbb}

/* ── DETAIL OVERLAY ── */
#dv{display:none;position:absolute;top:0;left:var(--sw);right:0;bottom:0;
  background:var(--bg);z-index:50;flex-direction:column}
#dv.open{display:flex}
#dh{display:flex;align-items:center;padding:6px 8px;background:var(--sur);
  border-bottom:1px solid var(--bdr);gap:7px;flex-shrink:0;min-height:34px}
#bk{background:#2a2a2a;border:none;color:#fff;border-radius:4px;
  padding:3px 10px;font-size:11px;cursor:pointer;white-space:nowrap}
#dt{font-size:12.5px;font-weight:600;flex:1;color:#fff}
#dp{font-size:10px;color:var(--dim);white-space:nowrap}
#db{flex:1;overflow-y:auto;scrollbar-width:none}
#db::-webkit-scrollbar{display:none}

/* options (radio list) */
.or{display:flex;align-items:center;padding:10px 12px;
  border-bottom:1px solid #131313;gap:10px;min-height:42px}
.or.sel{background:var(--hi)}
.rd{width:13px;height:13px;border-radius:50%;border:2px solid #888;
  flex-shrink:0;display:flex;align-items:center;justify-content:center}
.or.sel .rd{border-color:#fff}
.rd.f::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.ol{font-size:13.5px;flex:1}

/* submenu rows */
.sr{display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;border-bottom:1px solid #131313;min-height:38px;
  cursor:pointer;gap:6px}
.sr:active{background:#1a1a1a}
.sr.sel{background:var(--hi)}
.sn{font-size:12px;color:#ddd;flex:1;line-height:1.3;min-width:0}
.sv{font-size:11px;color:var(--val);white-space:nowrap;flex-shrink:0;text-align:right;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.sr.sel .sv{color:#fff}
.sa{color:var(--val);font-size:9px;flex-shrink:0}

/* placeholder */
.ph{padding:18px 12px;font-size:12px;color:var(--dim2);line-height:1.8}
</style>
</head>
<body>
<div id="root">

<!-- SEARCH BAR -->
<div id="sq">
  <span id="sq-ic">🔍</span>
  <input id="si" type="search" placeholder="Search menus / メニュー検索"
    autocomplete="off" spellcheck="false"
    oninput="doSearch(this.value)"
    onsearch="doSearch(this.value)">
  <span id="sq-cnt"></span>
  <button id="sq-x" onclick="clearSearch()">✕</button>
  <button id="lb" onclick="toggleLang()">EN</button>
</div>

<!-- SEARCH RESULTS PANEL -->
<div id="sr"></div>

<div id="app">

<!-- VERTICAL SIDEBAR -->
<div id="sb">
  <div class="tb t0" data-tab="myMenu"   onclick="setTab(this)">☆</div>
  <div class="tb t1" data-tab="cam0"     onclick="setTab(this)">⌂</div>
  <div class="tb t2 active" data-tab="shooting" onclick="setTab(this)">📷</div>
  <div class="tb t3" data-tab="exposure" onclick="setTab(this)">±</div>
  <div class="tb t4" data-tab="focus"    onclick="setTab(this)">AF<br>MF</div>
  <div class="tb t5" data-tab="playback" onclick="setTab(this)">▶</div>
  <div class="tb t6" data-tab="network"  onclick="setTab(this)">🌐</div>
  <div class="tb t7" data-tab="setup"    onclick="setTab(this)">⚙</div>
</div>

<!-- MAIN -->
<div id="mn">
  <div id="hd">
    <div id="bc"><b id="bc1">撮影</b></div>
    <span id="pg"></span>
  </div>
  <div id="ct">
    <div id="cl"></div>
    <div id="il"></div>
  </div>
  <div id="bt">
    <div class="nh"><span class="nk">▲▼</span><span id="h1">ページ</span></div>
    <div class="nh"><span class="nk">MENU</span><span id="h2">閉じる</span></div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div id="dv">
  <div id="dh">
    <button id="bk" onclick="popDetail()">◀ <span id="bkl">戻る</span></button>
    <div id="dt"></div>
    <div id="dp"></div>
  </div>
  <div id="db"></div>
</div>

</div><!-- #app -->

</div><!-- #root -->

<script>
// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
let L = 'jp'; // language
const $=id=>document.getElementById(id);
const t=o=>!o?'':typeof o==='object'?(o[L]||o.jp||''):o;

// ═══════════════════════════════════════════════════
// MENU DATA
// ═══════════════════════════════════════════════════

    // ── 4. Shooting Mode ──
    {num:4,name:{jp:'撮影モード',en:'Shooting Mode'},page:'8/63',items:[

      opts:[{jp:'電源連動',en:'Power Linked',s:1},{jp:'録画連動',en:'Recording Linked'},{jp:'録画連動+STBY',en:'Recording Linked + STBY'},{jp:'オート',en:'Auto'}]},

      note:{jp:'認証マーク: T D240008019 / R 007-AN0131 / Wi-Fi 5GHz帯は屋外使用不可',en:'Certification marks: T D240008019 / R 007-AN0131 / Wi-Fi 5GHz cannot be used outdoors'}},

]},

}; // MENU

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let tab='shooting', catI=0;
let stack=[]; // detail navigation stack [{item,title}]

// ═══════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════
function setTab(el){
  tab=el.dataset.tab; catI=0; stack=[];
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  closeDetail(); render();
}

// ═══════════════════════════════════════════════════
// CATEGORY SELECTION
// ═══════════════════════════════════════════════════
function setCat(i){catI=i;stack=[];closeDetail();renderContent();}

// ═══════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════
function openItem(item){
  if(item.type==='val')return;
  stack=[item];
  renderDetail();
  $('dv').classList.add('open');
}
function pushItem(item){
  if(item.type==='val')return;
  stack.push(item);
  renderDetail();
}
function popDetail(){
  if(stack.length>1){stack.pop();renderDetail();}
  else closeDetail();
}
function closeDetail(){$('dv').classList.remove('open');stack=[];}

function renderDetail(){
  const item=stack[stack.length-1];
  $('dt').textContent=t(item.name);
  $('dp').textContent=item.page||'';
  $('bkl').textContent=L==='jp'?'戻る':'Back';
  const body=$('db');

  if(item.type==='opt'){
    body.innerHTML=item.opts.map(o=>`
      <div class="or ${o.s?'sel':''}">
        <div class="rd ${o.s?'f':''}"></div>
        <div class="ol">${t(o)}</div>
      </div>`).join('');
    return;
  }
  if(item.type==='act'){
    const note=t(item.note)||'';
    body.innerHTML=`<div class="ph">${note||'—'}</div>`;
    return;
  }
  if(item.type==='sub'){
    body.innerHTML=(item.items||[]).map((sub,i)=>{
      const hasChild=sub.type==='opt'||sub.type==='sub'||sub.type==='act';
      const arrow=hasChild?`<span class="sa">▶</span>`:'';
      const v=t(sub.val)||(sub.type==='sub'?'▶':'');
      return `<div class="sr ${sub.s?'sel':''}" onclick="pushItem(MENU['${tab}'].cats[${catI}].items[${findItemIdx(item)}].items[${i}])" >
        <span class="sn">${t(sub.name)}</span>
        <span class="sv">${v}</span>${arrow}
      </div>`;
    }).join('');
    return;
  }
}

// find index of item in current cat's items (for nested onclick)
function findItemIdx(item){
  const items=MENU[tab].cats[catI].items;
  for(let i=0;i<items.length;i++)if(items[i]===item)return i;
  // search in stack to build path
  return -1;
}

// ═══════════════════════════════════════════════════
// OPEN ITEM — uses path indices for clean onclick
// ═══════════════════════════════════════════════════
function openAt(...path){
  // path = array of indices into items[]
  // resolves item from root of current cat
  let items=MENU[tab].cats[catI].items;
  let item=null;
  for(const i of path){item=items[i];items=item.items||[];}
  if(!item)return;
  if(item.type==='val')return;
  stack=[item]; // just push the item directly
  // For nested submenus, we need parent context — just push item into stack
  renderDetail();
  $('dv').classList.add('open');
}

// Better approach: items get onclick="openDirect(this_item)"
// But we need serialisable references. Use global item registry.
const REG={}; let rid=0;
function reg(item){if(!item._id){item._id='i'+(++rid);}REG[item._id]=item;return item._id;}

function openReg(id){
  const item=REG[id];
  if(!item||item.type==='val')return;
  stack=[item];
  renderDetail();
  $('dv').classList.add('open');
}
function pushReg(id){
  const item=REG[id];
  if(!item||item.type==='val')return;
  stack.push(item);
  renderDetail();
}

// ═══════════════════════════════════════════════════
// LANGUAGE TOGGLE
// ═══════════════════════════════════════════════════
function toggleLang(){
  L=L==='jp'?'en':'jp';
  $('lb').textContent=L==='jp'?'EN':'JP';
  if($('dv').classList.contains('open'))renderDetail();
  render();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const data=MENU[tab];
  $('bc1').textContent=t(data.title);
  $('h1').textContent=L==='jp'?'ページ':'Page';
  $('h2').textContent=L==='jp'?'閉じる':'Close';
  renderContent();
}

function renderContent(){
  const data=MENU[tab];
  const cats=data.cats||[];
  const cl=$('cl'), il=$('il');

  if(!cats.length){
    cl.innerHTML=`<div class="ph">${L==='jp'?'写真追加予定':'Photos coming soon'}</div>`;
    il.innerHTML=''; $('pg').textContent=''; return;
  }

  // Categories
  cl.innerHTML=cats.map((c,i)=>`
    <div class="ci ${i===catI?'on':''}" onclick="setCat(${i})">
      <span class="cn">${c.num}</span>
      <span class="cm">${t(c.name)}</span>
    </div>`).join('')+'<div class="ca">▼</div>';

  // Items
  const cat=cats[catI];
  $('pg').textContent=cat.page||'';

  if(!cat.items||!cat.items.length){
    il.innerHTML=`<div class="ph">${L==='jp'?'写真追加予定':'Photos coming soon'}</div>`;
    return;
  }

  il.innerHTML=cat.items.map(item=>{
    const id=reg(item);
    const clickable=item.type!=='val';
    const arrow=clickable?`<span class="ia">▶</span>`:'';
    const v=t(item.val)||(item.type==='sub'?'▶':'');
    return `<div class="ir ${clickable?'':'nd'}" ${clickable?`onclick="openReg('${id}')"`:''}>
      <span class="in">${t(item.name)}</span>
      ${v?`<span class="iv">${v}</span>`:''}${arrow}
    </div>`;
  }).join('');
}

// Also patch renderDetail to use REG
const _rd=renderDetail;
renderDetail=function(){
  const item=stack[stack.length-1];
  if(!item)return;
  $('dt').textContent=t(item.name);
  $('dp').textContent=item.page||'';
  $('bkl').textContent=L==='jp'?'戻る':'Back';
  const body=$('db');

  if(item.type==='opt'){
    body.innerHTML=item.opts.map(o=>`
      <div class="or ${o.s?'sel':''}">
        <div class="rd ${o.s?'f':''}"></div>
        <div class="ol">${t(o)}</div>
      </div>`).join('');
    return;
  }
  if(item.type==='act'){
    body.innerHTML=`<div class="ph">${t(item.note)||'—'}</div>`;
    return;
  }
  if(item.type==='sub'){
    body.innerHTML=(item.items||[]).map(sub=>{
      const sid=reg(sub);
      const clickable=sub.type!=='val';
      const arrow=clickable?`<span class="sa">▶</span>`:'';
      const v=t(sub.val)||(sub.type==='sub'?'▶':'');
      return `<div class="sr" ${clickable?`onclick="pushReg('${sid}')"`:'style="cursor:default"'}>
        <span class="sn">${t(sub.name)}</span>
        <span class="sv">${v}</span>${arrow}
      </div>`;
    }).join('');
    return;
  }
};

// ═══════════════════════════════════════════════════
// INIT — pre-register all items recursively
// ═══════════════════════════════════════════════════
function regAll(items){if(!items)return;for(const it of items){reg(it);regAll(it.items);regAll(it.opts);}}
for(const k in MENU){for(const c of(MENU[k].cats||[])){regAll(c.items);}}

// ═══════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════
const TB_COL={shooting:'#bb2f00',exposure:'#b85800',focus:'#b85800',
  playback:'#1144bb',network:'#116633',setup:'#775500',
  myMenu:'#2a2a2a',cam0:'#3a3a5a'};
const TB_ICO={shooting:'📷',exposure:'±',focus:'AF<br>MF',
  playback:'▶',network:'🌐',setup:'⚙',myMenu:'☆',cam0:'⌂'};

let SX=[];  // flat search index
function buildSX(){
  SX=[];
  for(const tk in MENU){
    const td=MENU[tk];
    (td.cats||[]).forEach((cat,ci)=>{
      (cat.items||[]).forEach(item=>idxItem(tk,ci,cat,item,[item]));
    });
  }
}
function idxItem(tk,ci,cat,item,stk){
  SX.push({tk,ci,cat,item,stk:[...stk]});
  (item.items||[]).forEach(sub=>idxItem(tk,ci,cat,sub,[...stk,sub]));
}
function matchesQ(item,q){
  const f=[
    item.name?.jp, item.name?.en,
    typeof item.val==='object'?item.val?.jp:item.val,
    typeof item.val==='object'?item.val?.en:'',
    item.note?.jp, item.note?.en
  ];
  return f.some(v=>v&&v.toLowerCase().includes(q));
}
function hl(str,q){
  if(!str||!q)return str||'';
  const i=str.toLowerCase().indexOf(q);
  if(i<0)return str;
  return str.slice(0,i)+'<mark>'+str.slice(i,i+q.length)+'</mark>'+str.slice(i+q.length);
}

let SM=[];  // current matches
function doSearch(v){
  const q=v.trim().toLowerCase();
  const x=$('sq-x');
  if(!q){clearSearch();return;}
  x.style.display='';
  SM=SX.filter(e=>matchesQ(e.item,q));
  $('sq-cnt').textContent=SM.length||'—';
  renderSR(q);
  $('sr').classList.add('open');
  $('app').style.display='none';
}
function clearSearch(){
  $('si').value='';SM=[];
  $('sq-cnt').textContent='';
  $('sq-x').style.display='none';
  $('sr').classList.remove('open');
  $('app').style.display='';
}
function renderSR(q){
  if(!SM.length){
    $('sr').innerHTML=`<div class="r0">${L==='jp'?'見つかりません':'No results found'}</div>`;
    return;
  }
  $('sr').innerHTML=SM.map((e,i)=>{
    const col=TB_COL[e.tk]||'#333';
    const ico=TB_ICO[e.tk]||'';
    // Always pull both languages for the item name
    const nmJP=e.item.name?.jp||e.item.name||'';
    const nmEN=e.item.name?.en||e.item.name||'';
    const vl=t(e.item.val);
    // Full breadcrumb in English: Tab › Category › [ancestor items…]
    const tabN=MENU[e.tk].title.en||MENU[e.tk].title.jp||'';
    const catN=e.cat.name?.en||e.cat.name?.jp||'';
    const parts=[tabN,catN];
    for(let j=0;j<e.stk.length-1;j++){
      const a=e.stk[j];
      parts.push(a.name?.en||a.name?.jp||a.name||'');
    }
    const breadcrumb=parts.join(' › ');
    return `<div class="rr" onclick="goResult(${i})">
      <div class="rb" style="background:${col}">${ico}</div>
      <div class="ri">
        <div class="rn">${hl(nmJP,q)}</div>
        <div class="re">${hl(nmEN,q)}</div>
        <div class="rc">${breadcrumb}</div>
      </div>
      ${vl?`<div class="rv">${vl}</div>`:''}
    </div>`;
  }).join('');
}
function goResult(i){
  const e=SM[i];
  // switch to correct tab
  tab=e.tk;
  document.querySelectorAll('.tb').forEach(el=>{
    el.classList.toggle('active',el.dataset.tab===tab);
  });
  catI=e.ci;
  // close search, restore app
  clearSearch();
  // render the main view
  render();
  // open detail overlay for this item if it has content
  const item=e.item;
  if(item.type!=='val'){
    stack=e.stk;
    renderDetail();
    $('dv').classList.add('open');
  }
}

buildSX();
render();

// ── Register service worker for offline use ──
if('serviceWorker' in navigator){
  const sw=`
const V='a7v-v1';
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(V).then(c=>c.addAll([self.location.pathname])));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const rc=res.clone();
    caches.open(V).then(c=>c.put(e.request,rc));
    return res;
  })));
});`;
  const blob=new Blob([sw],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
